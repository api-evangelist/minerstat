naftiko: 1.0.0-alpha2
info:
  label: Minerstat Mining Pools API — Pools
  description: 'Minerstat Mining Pools API — Pools. 1 operations. Lead operation: List mining pools. Self-contained Naftiko
    capability covering one Minerstat business surface.'
  tags:
  - Minerstat
  - Pools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MINERSTAT_API_KEY: MINERSTAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: minerstat-pools
    baseUri: https://api.minerstat.com/v2
    description: Minerstat Mining Pools API — Pools business capability. Self-contained, no shared references.
    resources:
    - name: pools
      path: /pools
      operations:
      - name: listpools
        method: GET
        description: List mining pools
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.MINERSTAT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: minerstat-pools-rest
    port: 8080
    description: REST adapter for Minerstat Mining Pools API — Pools. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/pools
      name: pools
      description: REST surface for pools.
      operations:
      - method: GET
        name: listpools
        description: List mining pools
        call: minerstat-pools.listpools
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: minerstat-pools-mcp
    port: 9090
    transport: http
    description: MCP adapter for Minerstat Mining Pools API — Pools. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-mining-pools
      description: List mining pools
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: minerstat-pools.listpools
      outputParameters:
      - type: object
        mapping: $.
